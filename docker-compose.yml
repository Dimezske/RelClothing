services:
  mysql:
    image: mysql:8.4
    container_name: relclothing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: relclothing
      MYSQL_USER: relclothing
      MYSQL_PASSWORD: relclothing
    ports:
      - "3306:3306"
    volumes:
      - relclothing-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  relclothing-mysql-data:
